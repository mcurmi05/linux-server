services:
  qbittorrent:
        image: linuxserver/qbittorrent:latest
        container_name: qbittorrent
        restart: unless-stopped
        ports:
          - "8080:8080"
          - "6881:6881"
          - "6881:6881/udp"   
        environment:
          - PUID=1000
          - PGID=1000
          - WEBUI_PORT=8080
        volumes:
          - ./config:/config
          - torrentingdownloadslocationpathname:/downloads